name: Build Emulator

on:
  push:
    branches: [master, ci/**]
    paths:
      - 'projects/CardputerZero-Emulator/**'
      - 'projects/APPLaunch/**'
      - 'projects/UserDemo/**'
      - 'SDK/**'
      - '.github/workflows/emulator-build.yml'
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  # ── macOS ───────────────────────────────────────────────────
  macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: brew install sdl2 sdl2_image freetype pkg-config nlohmann-json
    - name: Build
      run: |
        cd projects/CardputerZero-Emulator
        mkdir build && cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release
        make -j$(sysctl -n hw.ncpu)
    - name: Package
      run: |
        cd projects/CardputerZero-Emulator
        mkdir -p dist/CardputerZero-Emulator
        cp build/cardputer-emu dist/CardputerZero-Emulator/
        cp -r build/apps dist/CardputerZero-Emulator/
        cp -r build/assets dist/CardputerZero-Emulator/
        cp -r build/images dist/CardputerZero-Emulator/
        cd dist && tar czf ../CardputerZero-Emulator-macOS.tar.gz CardputerZero-Emulator
    - uses: actions/upload-artifact@v4
      with:
        name: emulator-macos
        path: projects/CardputerZero-Emulator/CardputerZero-Emulator-macOS.tar.gz

  # ── Linux ───────────────────────────────────────────────────
  linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libsdl2-dev libsdl2-image-dev libfreetype-dev pkg-config nlohmann-json3-dev
    - name: Build
      run: |
        cd projects/CardputerZero-Emulator
        mkdir build && cd build
        cmake .. -DCMAKE_BUILD_TYPE=Release
        make -j$(nproc)
    - name: Package
      run: |
        cd projects/CardputerZero-Emulator
        mkdir -p dist/CardputerZero-Emulator
        cp build/cardputer-emu dist/CardputerZero-Emulator/
        cp -r build/apps dist/CardputerZero-Emulator/
        cp -r build/assets dist/CardputerZero-Emulator/
        cp -r build/images dist/CardputerZero-Emulator/
        cd dist && tar czf ../CardputerZero-Emulator-Linux.tar.gz CardputerZero-Emulator
    - uses: actions/upload-artifact@v4
      with:
        name: emulator-linux
        path: projects/CardputerZero-Emulator/CardputerZero-Emulator-Linux.tar.gz

  # ── Windows (MinGW-w64) ─────────────────────────────────────
  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-SDL2
          mingw-w64-x86_64-SDL2_image
          mingw-w64-x86_64-freetype
          mingw-w64-x86_64-winpthreads-git
          make
          git
    - uses: actions/checkout@v4
    - name: Build
      run: |
        cd projects/CardputerZero-Emulator
        mkdir build && cd build
        cmake .. -G "MSYS Makefiles" -DCMAKE_BUILD_TYPE=Release
        make -j$(nproc)
    - name: Package
      run: |
        cd projects/CardputerZero-Emulator
        mkdir -p dist/CardputerZero-Emulator
        cp build/cardputer-emu.exe dist/CardputerZero-Emulator/
        cp -r build/apps dist/CardputerZero-Emulator/ 2>/dev/null || true
        cp -r build/assets dist/CardputerZero-Emulator/ 2>/dev/null || true
        cp -r build/images dist/CardputerZero-Emulator/ 2>/dev/null || true
        ldd build/cardputer-emu.exe | grep mingw64 | awk '{print $3}' | while read dll; do
          cp "$dll" dist/CardputerZero-Emulator/
        done
        cd dist && tar czf ../CardputerZero-Emulator-Windows.tar.gz CardputerZero-Emulator
    - uses: actions/upload-artifact@v4
      with:
        name: emulator-windows
        path: projects/CardputerZero-Emulator/CardputerZero-Emulator-Windows.tar.gz

  # ── Web (Emscripten/WASM) ───────────────────────────────────
  web:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Emscripten
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: 3.1.73
    - name: Build
      run: |
        cd projects/CardputerZero-Emulator
        mkdir build-web && cd build-web
        emcmake cmake .. -DCMAKE_BUILD_TYPE=Release
        emmake make -j$(nproc)
    - name: Package
      run: |
        cd projects/CardputerZero-Emulator
        mkdir -p dist-web
        cp build-web/index.html dist-web/
        cp build-web/index.js dist-web/
        cp build-web/index.wasm dist-web/
        cp build-web/index.data dist-web/
        cd dist-web && zip -r ../CardputerZero-Emulator-Web.zip .
    - uses: actions/upload-artifact@v4
      with:
        name: emulator-web
        path: projects/CardputerZero-Emulator/CardputerZero-Emulator-Web.zip
